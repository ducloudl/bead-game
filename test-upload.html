    <h1>上传模板功能测试</h1>
    <p>请打开 https://ducloudl.github.io/bead-game/ 并测试以下功能：</p>
    <ol>
        <li>点击工具栏中的 "📤 上传" 按钮</li>
        <li>选择一张图片</li>
        <li>选择网格大小（15x15, 20x20, 25x25, 30x30）</li>
        <li>查看预览并点击 "使用此模板"</li>
    </ol>
    <p>功能应该能够将图片转换为拼豆模板并应用到画板上。</p>
