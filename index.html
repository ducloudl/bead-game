<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>电子像素拼豆游戏</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 顶部状态栏 -->
  <header class="top-bar">
    <div class="top-left">
      <h1 class="logo">🎨 拼豆</h1>
    </div>
    <div class="top-center">
      <span class="stat-badge"><span id="bead-count">0</span> 颗</span>
      <span class="stat-badge" id="grid-size-label">30×24</span>
    </div>
    <div class="top-right">
      <button class="icon-btn" id="undo-btn" title="撤销">↩️</button>
      <button class="icon-btn" id="redo-btn" title="重做">↪️</button>
      <button class="icon-btn" id="clear-btn" title="清空">🗑️</button>
      <button class="icon-btn" id="export-btn" title="导出">💾</button>
    </div>
  </header>

  <!-- 画布区域 -->
  <main class="canvas-area">
    <div class="board-wrapper">
      <div id="board" class="board"></div>
    </div>
  </main>

  <!-- 底部工具栏 -->
  <footer class="bottom-bar">
    <!-- 工具选择 -->
    <div class="tools-strip">
      <button class="tool-item active" data-tool="pen" title="画笔">
        <span class="tool-icon">✏️</span>
        <span class="tool-label">画笔</span>
      </button>
      <button class="tool-item" data-tool="eraser" title="橡皮">
        <span class="tool-icon">🧹</span>
        <span class="tool-label">橡皮</span>
      </button>
      <button class="tool-item" data-tool="picker" title="取色">
        <span class="tool-icon">💉</span>
        <span class="tool-label">取色</span>
      </button>
      <button class="tool-item" data-tool="fill" title="填充">
        <span class="tool-icon">🪣</span>
        <span class="tool-label">填充</span>
      </button>
    </div>

    <!-- 当前颜色指示 -->
    <div class="current-color-bar">
      <span class="current-color-label">当前：</span>
      <div class="current-color-preview" id="current-color-preview"></div>
    </div>

    <!-- 颜色选择区 - 可横向滚动 -->
    <div class="colors-scroll-area">
      <div class="color-grid" id="color-palette"></div>
    </div>

    <!-- 高级功能折叠 -->
    <div class="advanced-toggle">
      <button class="adv-btn" id="adv-toggle">⚙️ 更多功能 ▾</button>
      <div class="adv-panel" id="adv-panel">
        <div class="adv-section">
          <label>模板</label>
          <select id="template-select">
            <option value="">-- 选择模板 --</option>
          </select>
          <button class="adv-action-btn" id="apply-template-btn">应用模板</button>
        </div>
        <div class="adv-section">
          <label>图片导入</label>
          <input type="file" id="image-upload" accept="image/*">
        </div>
      </div>
    </div>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
