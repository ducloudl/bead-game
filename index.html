<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电子像素拼豆游戏</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🎨 电子像素拼豆游戏</h1>
      <div class="controls">
        <button id="undo-btn" class="tool-btn" title="撤销 (Ctrl+Z)">↩️ 撤销</button>
        <button id="redo-btn" class="tool-btn" title="重做 (Ctrl+Y)">🔄 重做</button>
        <button id="clear-btn" class="tool-btn">🗑️ 清空</button>
        <button id="export-btn" class="tool-btn">💾 导出</button>
      </div>
    </header>
    
    <main>
      <div class="sidebar">
        <div class="tools">
          <h3>🛠️ 工具</h3>
          <div class="tool-group">
            <button class="tool-btn" data-tool="pen">✏️ 画笔</button>
            <button class="tool-btn" data-tool="eraser">🧹 橡皮</button>
            <button class="tool-btn" data-tool="picker">💉 取色器</button>
            <button class="tool-btn" data-tool="fill">🪣 填充</button>
          </div>
        </div>
        
        <div class="colors">
          <h3>🎨 颜色</h3>
          <div class="color-grid" id="color-palette"></div>
        </div>
        
        <div class="templates">
          <h3>📋 模板</h3>
          <select id="template-select">
            <option value="">选择模板</option>
          </select>
          <button id="apply-template-btn" class="action-btn">应用模板</button>
        </div>
        
        <div class="image-upload">
          <h3>🖼️ 图片转拼豆</h3>
          <input type="file" id="image-upload" accept="image/*">
        </div>
      </div>
      
      <div class="game-area">
        <div class="board-container">
          <div id="board" class="board"></div>
        </div>
        
        <div class="stats">
          <span>珠子数: <strong id="bead-count">0</strong></span>
          <span>网格: <strong id="grid-size">30×24</strong></span>
        </div>
      </div>
    </main>
  </div>
  
  <script type="module" src="js/app.js"></script>
  <script src="js/color-palette.js"></script>
</body>
</html>
